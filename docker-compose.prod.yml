version: '3.8'

services:
  # === Database & Infra ===
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexushr
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports:
      - "9092:9092"

  # === Backend Services ===
  api-gateway:
    build:
      context: ./backend
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  auth-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: auth-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nexushr
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  employee-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: employee-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nexushr
    depends_on:
      - postgres

  payroll-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: payroll-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nexushr
    depends_on:
      - postgres

  # === Frontend ===
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
  redisdata:

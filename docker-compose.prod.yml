# docker-compose.prod.yml
# Production-grade Docker Compose for NexusHR
# Day 22: Docker multi-stage builds & Compose

version: '3.9'

services:
  # ======================== DATA LAYER ========================
  postgres:
    image: postgres:17
    container_name: nexushr-postgres
    environment:
      POSTGRES_USER: nexushr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexushr_secret}
      POSTGRES_DB: nexushr_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexushr"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql

  redis:
    image: redis:7-alpine
    container_name: nexushr-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ======================== MESSAGING ========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexushr-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    deploy:
      resources:
        limits:
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexushr-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    deploy:
      resources:
        limits:
          memory: 1G

  # ======================== SEARCH ========================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: nexushr-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1G

  # ======================== IDENTITY ========================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: nexushr-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/nexushr_keycloak
      KC_DB_USERNAME: nexushr
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-nexushr_secret}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD:-admin}
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ======================== BACKEND SERVICES ========================
  auth-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: auth-service
    container_name: nexushr-auth
    ports:
      - "8090:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexushr_auth
      SPRING_DATASOURCE_USERNAME: nexushr
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nexushr_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  employee-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: employee-service
    container_name: nexushr-employee
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexushr_employee
      SPRING_DATASOURCE_USERNAME: nexushr
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nexushr_secret}
    depends_on:
      postgres:
        condition: service_healthy

  payroll-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: payroll-service
    container_name: nexushr-payroll
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexushr_payroll
      SPRING_DATASOURCE_USERNAME: nexushr
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nexushr_secret}
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: ai-service
    container_name: nexushr-ai
    ports:
      - "8086:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexushr_ai
      SPRING_DATASOURCE_USERNAME: nexushr
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nexushr_secret}
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: ./backend
      args:
        SERVICE_NAME: api-gateway
    container_name: nexushr-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - employee-service
      - payroll-service
      - ai-service

  # ======================== FRONTEND ========================
  frontend:
    build:
      context: ./frontend
    container_name: nexushr-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway

  # ======================== MONITORING ========================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: nexushr-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    container_name: nexushr-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  es_data:
  prometheus_data:
  grafana_data:

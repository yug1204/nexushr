name: NexusHR CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ======================== BACKEND ========================
  backend-lint-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: nexushr
          POSTGRES_PASSWORD: nexushr_secret
          POSTGRES_DB: nexushr_main
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Compile & Run Unit Tests
        working-directory: backend
        run: mvn clean verify -B -Dspring.profiles.active=test

      - name: Generate Jacoco Coverage Report
        working-directory: backend
        run: mvn jacoco:report -B
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/**/target/surefire-reports/

  # ======================== FRONTEND ========================
  frontend-lint-build:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ======================== DOCKER ========================
  docker-build:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [auth-service, employee-service, attendance-service, payroll-service, performance-service, ai-service, notification-service, api-gateway]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        working-directory: backend
        run: |
          docker build \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -t nexushr/${{ matrix.service }}:${{ github.sha }} \
            -t nexushr/${{ matrix.service }}:latest \
            .

  # ======================== SECURITY ========================
  security-scan:
    name: Security - Dependency Scan
    runs-on: ubuntu-latest
    needs: [backend-lint-test]

    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth Service
        - id: auth-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/auth/**

        # Employee Service
        - id: employee-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/employees/**

        # Attendance Service
        - id: attendance-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/attendance/**

        # Payroll Service
        - id: payroll-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/payroll/**

        # Performance Service
        - id: performance-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/performance/**

        # AI Service
        - id: ai-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/ai/**

        # Notification Service
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/notifications/**

        # Recruitment Service
        - id: recruitment-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/recruitment/**

        # Reports (served from employee-service)
        - id: reports
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/reports/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    com.nexushr: DEBUG
    org.springframework.cloud.gateway: DEBUG

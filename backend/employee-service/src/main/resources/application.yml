spring:
  application:
    name: employee-service
  datasource:
    url: jdbc:postgresql://localhost:5432/nexushr_employee
    username: nexushr
    password: nexushr_secret
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8081
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

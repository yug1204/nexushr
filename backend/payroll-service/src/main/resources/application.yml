spring:
  application:
    name: payroll-service
  datasource:
    url: jdbc:postgresql://localhost:5432/nexushr_payroll
    username: nexushr
    password: nexushr_secret
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
server:
  port: 8082
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
